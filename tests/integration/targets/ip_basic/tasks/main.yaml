- name: ip
  block:
    - set_fact:
        r: "{{ 1000000000 | random }}"

    - name: Create a Linode Instance
      linode.cloud.instance:
        label: 'ansible-test-{{ r }}'
        region: us-southeast
        type: g6-standard-1
        image: linode/alpine3.23
        state: present
        firewall_id: '{{ firewall_id }}'
      register: create_instance

    - name: Allocate a new IP to the Linode
      linode.cloud.ip:
        linode_id: '{{ create_instance.instance.id }}'
        public: true
        type: ipv4
        state: present
      register: allocate_ip

    - name: Assert changes
      assert:
        that:
          - allocate_ip.ip.linode_id == create_instance.instance.id
          - allocate_ip.ip.type == 'ipv4'
          - allocate_ip.ip.region == create_instance.instance.region

    - name: Promote allocated IP to reserved
      linode.cloud.ip:
        address: '{{ allocate_ip.ip.address }}'
        reserved: true
        state: present
      register: promote_ip

    - name: Assert IP was promoted to reserved
      assert:
        that:
          - promote_ip.changed
          - promote_ip.ip.address == allocate_ip.ip.address
          - promote_ip.ip.reserved == true

    - name: Promote again (idempotency check)
      linode.cloud.ip:
        address: '{{ allocate_ip.ip.address }}'
        reserved: true
        state: present
      register: promote_ip_again

    - name: Assert no change on second promotion
      assert:
        that:
          - not promote_ip_again.changed

    - name: Apply tags to the reserved IP
      linode.cloud.ip:
        address: '{{ allocate_ip.ip.address }}'
        tags:
          - test-tag
        state: present
      register: tag_ip

    - name: Assert tags were applied
      assert:
        that:
          - tag_ip.changed
          - "'test-tag' in tag_ip.ip.tags"

    - name: Apply tags again (idempotency check)
      linode.cloud.ip:
        address: '{{ allocate_ip.ip.address }}'
        tags:
          - test-tag
        state: present
      register: tag_ip_again

    - name: Assert no change on second tag apply
      assert:
        that:
          - not tag_ip_again.changed

#    - name: Delete an IP
#      linode.cloud.ip:
#        address: allocate_ip.ip.address
#        state: absent
#      register: delete_ip

  always:
    - ignore_errors: true
      block:
        - name: Delete the reserved IP
          linode.cloud.reserved_ip:
            address: '{{ allocate_ip.ip.address }}'
            state: absent
          when: allocate_ip is defined and allocate_ip.ip is defined

        - name: Delete instance
          linode.cloud.instance:
            label: '{{ create_instance.instance.label }}'
            state: absent


  environment:
    LINODE_UA_PREFIX: '{{ ua_prefix }}'
    LINODE_API_TOKEN: '{{ api_token }}'
    LINODE_API_URL: '{{ api_url }}'
    LINODE_API_VERSION: '{{ api_version }}'
    LINODE_CA: '{{ ca_file or "" }}'


