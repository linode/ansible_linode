- name: reserved_ip_list_basic
  block:
    - name: Reserve a new IP address
      linode.cloud.reserved_ip:
        api_token: "{{ api_token }}"
        ua_prefix: "{{ ua_prefix }}"
        region: us-ord
        tags:
          - list-test
        state: present
      register: reserve_ip

    - name: List all reserved IPs
      linode.cloud.reserved_ip_list:
        api_token: "{{ api_token }}"
        ua_prefix: "{{ ua_prefix }}"
      register: ip_list

    - name: Assert the reserved IP is in the list
      assert:
        that:
          - ip_list.reserved_ips | length > 0
          - reserve_ip.reserved_ip.address in (ip_list.reserved_ips | map(attribute='address') | list)

  always:
    - ignore_errors: true
      block:
        - name: Delete reserved IP
          linode.cloud.reserved_ip:
            api_token: "{{ api_token }}"
            ua_prefix: "{{ ua_prefix }}"
            address: "{{ reserve_ip.reserved_ip.address }}"
            state: absent
          when: reserve_ip is defined

  environment:
    LINODE_UA_PREFIX: '{{ ua_prefix }}'
    LINODE_API_TOKEN: '{{ api_token }}'
    LINODE_API_URL: '{{ api_url }}'
    LINODE_API_VERSION: '{{ api_version }}'
    LINODE_CA: '{{ ca_file or "" }}'
