- name: instance_reserved_ip
  block:
    - name: Reserve a new IP address
      linode.cloud.reserved_ip:
        api_token: "{{ api_token }}"
        ua_prefix: "{{ ua_prefix }}"
        region: us-ord
        state: present
      register: reserve_ip

    - set_fact:
        r: "{{ 1000000000 | random }}"

    - name: Create an instance with the reserved IP
      linode.cloud.instance:
        api_token: "{{ api_token }}"
        ua_prefix: "{{ ua_prefix }}"
        label: "ansible-test-inst-{{ r }}"
        region: us-ord
        type: g6-nanode-1
        image: linode/alpine3.19
        ipv4:
          - "{{ reserve_ip.reserved_ip.address }}"
        wait: false
        state: present
        firewall_id: '{{ firewall_id }}'
      register: inst_create

    - name: Assert instance was created with the reserved IP
      assert:
        that:
          - inst_create.changed
          - reserve_ip.reserved_ip.address in inst_create.instance.ipv4

  always:
    - ignore_errors: true
      block:
        - name: Delete instance
          linode.cloud.instance:
            api_token: "{{ api_token }}"
            ua_prefix: "{{ ua_prefix }}"
            label: "ansible-test-inst-{{ r }}"
            state: absent
          when: inst_create is defined

        - name: Delete reserved IP
          linode.cloud.reserved_ip:
            api_token: "{{ api_token }}"
            ua_prefix: "{{ ua_prefix }}"
            address: "{{ reserve_ip.reserved_ip.address }}"
            state: absent
          when: reserve_ip is defined

  environment:
    LINODE_UA_PREFIX: '{{ ua_prefix }}'
    LINODE_API_TOKEN: '{{ api_token }}'
    LINODE_API_URL: '{{ api_url }}'
    LINODE_API_VERSION: '{{ api_version }}'
    LINODE_CA: '{{ ca_file or "" }}'
